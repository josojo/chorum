# Staging overlay: production-like runtime settings for the public EC2 box.
#
# Use explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build
#
# Required values live in the host's gitignored .env file. Compose fails fast
# if any are missing, so staging cannot silently boot with committed dev
# passwords, the dev broker signing key, or disabled registry confirmation.
#
# Identity posture: staging deliberately runs Self in MOCK-PASSPORT mode (see the
# self-bridge block) so verified agents can onboard without a real document and
# populate staging with real data. The broker still verifies every proof and
# keeps REQUIRE_REGISTRY_CONFIRMATION=1 (against Celo Alfajores testnet). The
# demo seed is shadowed out (see the postgres block) so staging starts empty.
services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${HEARME_STAGING_POSTGRES_ADMIN_PASSWORD:?set in staging .env}
      HEARME_DB_ADMIN_PASSWORD: ${HEARME_STAGING_POSTGRES_ADMIN_PASSWORD:?set in staging .env}
      HEARME_DB_WEB_PASSWORD: ${HEARME_STAGING_POSTGRES_WEB_PASSWORD:?set in staging .env}
      HEARME_DB_BROKER_PASSWORD: ${HEARME_STAGING_POSTGRES_BROKER_PASSWORD:?set in staging .env}
      HEARME_DB_CLASSIFIER_PASSWORD: ${HEARME_STAGING_POSTGRES_CLASSIFIER_PASSWORD:?set in staging .env}
    # Start staging EMPTY: shadow the demo seed with a no-op at the same
    # container target (compose volume-merge keys on the mount path, so this
    # wins over the base mount of db/init/03-seed.sql). All data on staging is
    # then real — produced by verified agents that onboard with a Self mock
    # passport (see self-bridge below). Mirrors the prod no-seed posture.
    # NOTE: only takes effect on a FRESH volume; an existing volume keeps its
    # rows until `docker compose down -v` recreates it.
    volumes:
      - ./db/init.staging/03-seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro

  broker:
    environment:
      HEARME_BROKER_DATABASE_URL: postgres://hearme_broker:${HEARME_STAGING_POSTGRES_BROKER_PASSWORD:?set in staging .env}@postgres:5432/hearme
      # Staging deliberately does NOT set HEARME_BROKER_DEV_MODE, so the broker's
      # fail-closed startup checks run (startup_checks.py). The overrides below
      # are what make them pass — drop one and the broker refuses to boot.
      HEARME_BROKER_REQUIRE_REGISTRY_CONFIRMATION: "1"
      HEARME_BROKER_EXPOSE_REJECTION_REASONS: "0"
      HEARME_BROKER_SIGNING_KEY: ${HEARME_STAGING_BROKER_SIGNING_KEY:?set in staging .env}
      # Per-question voter-tag secret store (ADR-098): the broker-owned
      # `hearme_secrets` DB on the box's container Postgres (04-secrets-db.sh),
      # with each secret wrapped at rest under the master key.
      HEARME_BROKER_SECRETS_DATABASE_URL: postgres://hearme_broker:${HEARME_STAGING_POSTGRES_BROKER_PASSWORD:?set in staging .env}@postgres:5432/hearme_secrets
      HEARME_BROKER_VOTER_TAG_MASTER_KEY: ${HEARME_STAGING_BROKER_VOTER_TAG_MASTER_KEY:?set in staging .env}

  self-bridge:
    environment:
      # The callback the Self app posts proofs to MUST be public HTTPS.
      SELF_ENDPOINT: ${HEARME_STAGING_SELF_ENDPOINT:?set in staging .env}
      # Staging exercises the REAL register->verify->envelope pipeline, but with
      # Self MOCK passports so verified agents can onboard from the Self app
      # without a real document. The proof is still verified (broker -> bridge ->
      # @selfxyz/core); only the passport is mock. This is what lets us populate
      # staging with real, verified-agent data and rehearse data management
      # before prod. Prod (docker-compose.prod.yml) keeps these at 0 (mainnet).
      SELF_ENDPOINT_TYPE: staging_https
      SELF_MOCK_PASSPORT: "1"
      SELF_DEV_MODE: "1"
      # A mock passport's identity commitment lives on Celo Alfajores testnet.
      # Without this pin the SDK defaults the QR to chainID 42220 (mainnet) for
      # endpointType=staging_https, so the scan fails on a network/root mismatch.
      SELF_CHAIN_ID: "44787"

  migrator:
    environment:
      MIGRATOR_DATABASE_URL: postgres://hearme_admin:${HEARME_STAGING_POSTGRES_ADMIN_PASSWORD:?set in staging .env}@postgres:5432/hearme

  web:
    environment:
      DATABASE_URL: postgres://hearme_web:${HEARME_STAGING_POSTGRES_WEB_PASSWORD:?set in staging .env}@postgres:5432/hearme

  classifier:
    environment:
      HEARME_CLASSIFIER_DATABASE_URL: postgres://hearme_classifier:${HEARME_STAGING_POSTGRES_CLASSIFIER_PASSWORD:?set in staging .env}@postgres:5432/hearme
      HEARME_CLASSIFIER_OPENROUTER_API_KEY: ${HEARME_STAGING_OPENROUTER_API_KEY:?set in staging .env}

  caddy:
    image: caddy:2
    container_name: hearme-caddy
    restart: unless-stopped
    depends_on:
      - web
      - self-bridge
    environment:
      # The Caddyfile uses {$CADDY_SITE_HOST}; Caddy expands it at config-load
      # time. The fail-fast ":?" form makes compose error out instead of caddy
      # silently serving a config with an empty site block.
      CADDY_SITE_HOST: ${HEARME_STAGING_CADDY_SITE_HOST:?set in staging .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
