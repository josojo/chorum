name: build-binaries

# Build the standalone `hearme-skill` binary (Rust) for Linux x86_64 and
# aarch64, smoke-test it, upload it as a CI artifact, and — on a version tag —
# attach both binaries plus install.sh to the GitHub Release. Each arch is built
# natively on a runner of that arch and targets musl so release binaries do not
# inherit the GitHub runner's glibc version requirement.
#
# Runs on push to main (catch release-build / aarch64 breakage post-merge) and on
# version tags (the actual release). Not on PRs: the e2e job in ci.yml already
# builds its own binary, and per-PR cross-arch release builds aren't worth the
# cost. No `paths` filter — it would also gate tag pushes and could skip a
# release build whose tagged commit happens not to touch packages/skill.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to attach assets to the Release on tag builds

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-musl
    defaults:
      run:
        working-directory: packages/skill
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl C toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/skill

      - name: Build binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Smoke-test the binary
        run: |
          ./target/${{ matrix.target }}/release/hearme-skill --help
          # list-questions never raises: with no broker reachable it prints a
          # JSON {"error": ...} and exits 0. Confirms the built binary works.
          ./target/${{ matrix.target }}/release/hearme-skill list-questions

      - name: Rename for release
        run: mv "target/${{ matrix.target }}/release/hearme-skill" "target/${{ matrix.target }}/release/hearme-skill-linux-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearme-skill-linux-${{ matrix.arch }}
          path: packages/skill/target/${{ matrix.target }}/release/hearme-skill-linux-${{ matrix.arch }}
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/skill/target/${{ matrix.target }}/release/hearme-skill-linux-${{ matrix.arch }}
            packages/skill/scripts/install.sh
