name: ci

# Single source of truth for "is this commit shippable?". Runs on every PR and
# is also called by deploy-staging.yml (workflow_call) so a deploy to staging
# can gate on a green run of exactly these checks — see `needs: ci` there.
#
# Direct pushes to main do NOT trigger this workflow on their own: deploy-staging
# runs on push-to-main and invokes this via workflow_call, so main is covered
# once, not twice.

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  skill:
    name: skill (Rust fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/skill
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/skill
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --locked

  web:
    name: web (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Migrations in sync with schema.ts
        run: npm run db:check
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm run test

  broker:
    name: broker (typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/broker/package-lock.json
      # The broker reuses packages/web/src/db/schema.ts (the single source of
      # truth). Installing web's deps makes that file's drizzle-orm import
      # resolve for tsc/vitest (the Docker build hoists a shared install instead).
      - name: Install web deps (for the reused schema)
        working-directory: packages/web
        run: npm ci
      - name: Install
        working-directory: packages/broker
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        working-directory: packages/broker
        run: npm run typecheck
      # DB-backed tests spin up Postgres via testcontainers (Docker is available
      # on GitHub-hosted runners); the rest run pure.
      - name: Test (vitest)
        working-directory: packages/broker
        run: npm run test

  self-bridge:
    name: self-bridge (node --test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/self-bridge
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No lockfile here yet, so `npm install`. The /callback test imports
      # server.js, which pulls in express + the @selfxyz SDK at load time.
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Test (node --test)
        run: npm test

  classifier:
    name: classifier (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/classifier
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/classifier/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm test

  db:
    name: schema applies and boundaries hold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start postgres
        run: docker compose up -d postgres
      - name: Wait for healthy
        run: |
          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{.State.Health.Status}}' hearme-postgres 2>/dev/null || echo starting)
            if [ "$status" = "healthy" ]; then
              echo "postgres healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "postgres failed to become healthy:"
          docker logs hearme-postgres
          exit 1
      - name: Verify schema + roles + grant boundaries
        run: scripts/verify-db.sh
      - name: Show postgres logs on failure
        if: failure()
        run: docker logs hearme-postgres
      - name: Tear down
        if: always()
        run: docker compose down -v

  e2e:
    name: e2e (clean Hermes agent answers a question)
    runs-on: ubuntu-latest
    # The most lifelike check: spin up the real server stack, install a clean
    # Hermes agent + the hearme plugin, onboard a fresh identity (phone-free dev
    # bypass), and have it answer a seeded question — asserting the broker
    # accepts the signed envelope and the aggregate moves. Everything is real
    # except proof-of-personhood (and, per the model-bypass design, the answer is
    # submitted via the binary the plugin shells out to rather than an LLM run).
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/skill
      - name: Build the hearme-skill binary
        working-directory: packages/skill
        run: cargo build --release --locked

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python + Hermes deps
        # cryptography: the one-time agent keypair in ci-e2e.sh.
        # hermes-agent: the real, clean agent we install the plugin into.
        run: pip install --quiet cryptography "hermes-agent==0.15.2"

      - name: Bring up the server stack (with the CI dev-register overlay)
        # Only the services the e2e needs — the classifier wants an OpenRouter
        # key and the web UI isn't asserted here, so both are left out.
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d --build postgres migrator self-bridge broker

      - name: Answer a question end-to-end (broker pipeline)
        env:
          BROKER_URL: http://127.0.0.1:8000
          HEARME_BIN: packages/skill/target/release/hearme-skill
          HEARME_SKILL_ROOT_DIR: ${{ github.workspace }}/.hermes/hearme
        run: scripts/ci-e2e.sh

      - name: Install the hearme plugin into the clean Hermes agent
        run: |
          packages/skill/target/release/hearme-skill install --host hermes --no-restart

      - name: Assert Hermes recognizes and enables the plugin
        run: |
          set -euo pipefail
          echo "-- hermes --version"
          timeout 120 hermes --version </dev/null || true
          echo "-- hermes plugins list (before enable)"
          timeout 120 hermes plugins list </dev/null | tee plugins.txt
          grep -qi hearme plugins.txt || { echo "FATAL: Hermes did not list the hearme plugin" >&2; exit 1; }
          timeout 120 hermes plugins enable hearme </dev/null || true
          echo "-- hermes plugins list (after enable)"
          timeout 120 hermes plugins list </dev/null | tee plugins-after.txt
          grep -qi hearme plugins-after.txt || { echo "FATAL: hearme missing after enable" >&2; exit 1; }

      - name: Answer a question through the plugin's registered tool handler
        # Loads the same shim a gateway loads, then calls the registered
        # hearme_list_open_questions / hearme_submit_answer handlers against the
        # live broker using the identity onboarded above — proving the continuous
        # path: plugin tool handler -> hearme-skill binary -> broker accepted.
        env:
          HEARME_SKILL_ROOT_DIR: ${{ github.workspace }}/.hermes/hearme
          HEARME_SKILL_BROKER_URL: http://127.0.0.1:8000
          HEARME_E2E_LIVE_SUBMIT: "1"
        run: |
          python3 scripts/ci-hermes-plugin-load.py "$HOME/.hermes/plugins/hearme/__init__.py"

      - name: Dump broker + bridge logs on failure
        if: failure()
        run: |
          echo "=== broker ===";      docker logs hearme-broker      2>&1 | tail -n 200 || true
          echo "=== self-bridge ==="; docker logs hearme-self-bridge 2>&1 | tail -n 100 || true
          echo "=== postgres ===";    docker logs hearme-postgres    2>&1 | tail -n 50  || true
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
