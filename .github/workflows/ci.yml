name: ci

# Single source of truth for "is this commit shippable?". Runs on every PR and
# is also called by deploy-staging.yml (workflow_call) so a deploy to staging
# can gate on a green run of exactly these checks — see `needs: ci` there.
#
# Direct pushes to main do NOT trigger this workflow on their own: deploy-staging
# runs on push-to-main and invokes this via workflow_call, so main is covered
# once, not twice.

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  skill:
    name: skill (Rust fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/skill
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/skill
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --locked

  web:
    name: web (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Migrations in sync with schema.ts
        run: npm run db:check
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm run test

  broker:
    name: broker (typecheck + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/broker/package-lock.json
      # The broker reuses packages/web/src/db/schema.ts (the single source of
      # truth). Installing web's deps makes that file's drizzle-orm import
      # resolve for tsc/vitest (the Docker build hoists a shared install instead).
      - name: Install web deps (for the reused schema)
        working-directory: packages/web
        run: npm ci
      - name: Install
        working-directory: packages/broker
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        working-directory: packages/broker
        run: npm run typecheck
      # DB-backed tests spin up Postgres via testcontainers (Docker is available
      # on GitHub-hosted runners); the rest run pure.
      - name: Test (vitest)
        working-directory: packages/broker
        run: npm run test

  self-bridge:
    name: self-bridge (node --test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/self-bridge
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No lockfile here yet, so `npm install`. The /callback test imports
      # server.js, which pulls in express + the @selfxyz SDK at load time.
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Test (node --test)
        run: npm test

  classifier:
    name: classifier (typecheck + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/classifier
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/classifier/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm test

  db:
    name: schema applies and boundaries hold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start postgres
        run: docker compose up -d postgres
      - name: Wait for healthy
        run: |
          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{.State.Health.Status}}' hearme-postgres 2>/dev/null || echo starting)
            if [ "$status" = "healthy" ]; then
              echo "postgres healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "postgres failed to become healthy:"
          docker logs hearme-postgres
          exit 1
      - name: Verify schema + roles + grant boundaries
        run: scripts/verify-db.sh
      - name: Show postgres logs on failure
        if: failure()
        run: docker logs hearme-postgres
      - name: Tear down
        if: always()
        run: docker compose down -v
