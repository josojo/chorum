# Prod overlay: mainnet-Self / fail-closed runtime for the public EC2 prod box.
#
# Use explicitly (do NOT rely on a docker-compose.override.yml on the host —
# implicit overrides hide "what is actually running" from anyone reading the
# repo):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
#
# Required values live in the host's gitignored .env file. Compose fails fast
# if any are missing, so prod cannot silently boot with committed dev passwords,
# the dev broker signing key, mock passports, the Self testnet, or disabled
# registry confirmation. See PROD.md for the per-box bring-up notes.
services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${HEARME_PROD_POSTGRES_ADMIN_PASSWORD:?set in prod .env}
      HEARME_DB_ADMIN_PASSWORD: ${HEARME_PROD_POSTGRES_ADMIN_PASSWORD:?set in prod .env}
      HEARME_DB_WEB_PASSWORD: ${HEARME_PROD_POSTGRES_WEB_PASSWORD:?set in prod .env}
      HEARME_DB_BROKER_PASSWORD: ${HEARME_PROD_POSTGRES_BROKER_PASSWORD:?set in prod .env}
      HEARME_DB_CLASSIFIER_PASSWORD: ${HEARME_PROD_POSTGRES_CLASSIFIER_PASSWORD:?set in prod .env}
    volumes:
      # Shadow the demo seed so prod comes up with zero rows in
      # askers/questions/envelopes/aggregates/registrations. Compose merges
      # service volumes by container path, so this overrides the base mount.
      - ./db/init.prod/03-seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro

  broker:
    environment:
      HEARME_BROKER_DATABASE_URL: postgres://hearme_broker:${HEARME_PROD_POSTGRES_BROKER_PASSWORD:?set in prod .env}@postgres:5432/hearme
      # Fail closed at startup if any documented dev default is still set
      # (dev signing key, dev DB password, dev-bypass route, oracle-mode
      # rejection reasons, registry-confirmation disabled). See
      # packages/broker/src/startupChecks.ts.
      # NOTE: this TS port still uses the opt-in HEARME_BROKER_PRODUCTION_MODE
      # toggle, NOT the "fail-closed-by-default + opt-in HEARME_BROKER_DEV_MODE"
      # inversion that landed on main in #62 (fix(broker): fail closed by
      # default). Until that inversion is ported, this env var MUST be set in
      # prod — without it the startup checks do not run and the dev defaults
      # pass through silently. Follow-up: port #62 to TS.
      HEARME_BROKER_PRODUCTION_MODE: "1"
      HEARME_BROKER_REQUIRE_REGISTRY_CONFIRMATION: "1"
      HEARME_BROKER_EXPOSE_REJECTION_REASONS: "0"
      HEARME_BROKER_DEV_INSECURE_REGISTER: "0"
      HEARME_BROKER_SIGNING_KEY: ${HEARME_PROD_BROKER_SIGNING_KEY:?set in prod .env}
      HEARME_BROKER_VOTER_TAG_SECRET: ${HEARME_PROD_BROKER_VOTER_TAG_SECRET:?set in prod .env}

  self-bridge:
    environment:
      # The callback the Self app posts proofs to MUST be public HTTPS.
      SELF_ENDPOINT: ${HEARME_PROD_SELF_ENDPOINT:?set in prod .env}
      # Mainnet endpoint type (not staging_https).
      SELF_ENDPOINT_TYPE: https
      # Real identity path: no mock passports, no dev mode.
      SELF_MOCK_PASSPORT: "0"
      SELF_DEV_MODE: "0"
      # Fail closed: refuse to boot if a mock/dev posture survives into prod
      # (mirrors the broker's startup_checks.py). See packages/self-bridge/src/server.js.
      SELF_PRODUCTION_MODE: "1"
      # Celo mainnet — pin so @selfxyz/core targets the mainnet IdentityVerification
      # Hub V2 (0xe57F4773bd9c9d8b6Cd70431117d353298B9f5BF) and not a testnet root.
      # The SDK does the on-chain registry/root check inside verify() and picks the
      # RPC + hub from the chain id; the bridge does not need SELF_CELO_RPC_URL or
      # SELF_REGISTRY_ADDRESS (see packages/self-bridge/src/server.js:148-179).
      SELF_CHAIN_ID: "42220"

  migrator:
    environment:
      MIGRATOR_DATABASE_URL: postgres://hearme_admin:${HEARME_PROD_POSTGRES_ADMIN_PASSWORD:?set in prod .env}@postgres:5432/hearme

  web:
    environment:
      DATABASE_URL: postgres://hearme_web:${HEARME_PROD_POSTGRES_WEB_PASSWORD:?set in prod .env}@postgres:5432/hearme

  classifier:
    environment:
      HEARME_CLASSIFIER_DATABASE_URL: postgres://hearme_classifier:${HEARME_PROD_POSTGRES_CLASSIFIER_PASSWORD:?set in prod .env}@postgres:5432/hearme
      HEARME_CLASSIFIER_OPENROUTER_API_KEY: ${HEARME_PROD_OPENROUTER_API_KEY:?set in prod .env}

  caddy:
    image: caddy:2
    container_name: hearme-caddy
    restart: unless-stopped
    depends_on:
      - web
      - self-bridge
    environment:
      # The Caddyfile uses {$CADDY_SITE_HOST}; Caddy expands it at config-load
      # time. The fail-fast ":?" form makes compose error out instead of caddy
      # silently serving a config with an empty site block.
      CADDY_SITE_HOST: ${HEARME_PROD_CADDY_SITE_HOST:?set in prod .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
