# Prod runtime: mainnet-Self / fail-closed stack for the public EC2 prod box,
# backed by **managed Postgres (AWS RDS)** instead of an on-box container.
#
# This is a STANDALONE compose file, not an overlay. Each service `extends` its
# base definition in docker-compose.yml (inheriting build, the SHA-pinned
# `image:` tag used by the rollback machinery in §7, ports, and healthcheck),
# then overrides the env for prod and — crucially — resets `depends_on` to drop
# the local `postgres` service, which prod does not run. (A `-f base -f overlay`
# merge cannot *remove* a service or a depends_on edge, so prod is expressed as
# one self-contained file.) Bring it up with a single -f:
#
#   HEARME_DEPLOY_SHA=$(git rev-parse --short=12 HEAD) \
#     docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
#
# `--remove-orphans` clears the old on-box `hearme-postgres` container left from
# a pre-RDS deployment. Migrate its data into RDS FIRST — see docs/DEPLOYMENT.md
# §4 (cutover runbook). The database now lives in RDS: automated backups + PITR,
# off-box and durable, which is the whole point of the move. Deploy safety
# (SHA-pinned images, health gate, last-good tracking, rollback) is unchanged —
# see §7; the `image:` tags are inherited from the base via `extends`.
#
# Required values live in the host's gitignored .env file (rendered from AWS SSM
# — see docs/DEPLOYMENT.md §1.1). Compose fails fast if any are missing, so prod
# cannot silently boot with committed dev passwords, the dev broker signing key,
# mock passports, the Self testnet, or disabled registry confirmation.
# HEARME_PROD_POSTGRES_HOST is the RDS endpoint hostname.
#
# Every DSN below ends with `?sslmode=require`: RDS Postgres forces TLS
# (rds.force_ssl=1) and rejects unencrypted connections ("no pg_hba.conf entry
# … no encryption"). postgres.js maps sslmode=require to an encrypted connection
# with rejectUnauthorized=false — TLS without verifying RDS's private CA, which
# is what we want without bundling the CA. (verify-full + the RDS CA bundle is a
# later hardening step.) The container Postgres in dev/staging does not need it,
# which is why only the prod DSNs carry it.
services:
  broker:
    extends:
      file: docker-compose.yml
      service: broker
    # Drop the local-postgres edge; prod's DB is RDS (reached over the VPC).
    depends_on: !reset
      migrator:
        condition: service_completed_successfully
      self-bridge:
        condition: service_started
    environment:
      # Base sets HEARME_BROKER_DEV_MODE=1 for local dev; `extends` would inherit
      # it. The TS broker does not read it (the fail-closed checks key off
      # PRODUCTION_MODE), but blank it so the prod config is not misleading.
      HEARME_BROKER_DEV_MODE: ""
      HEARME_BROKER_DATABASE_URL: postgres://hearme_broker:${HEARME_PROD_POSTGRES_BROKER_PASSWORD:?set in prod .env}@${HEARME_PROD_POSTGRES_HOST:?set in prod .env}:5432/hearme?sslmode=require
      # Fail closed at startup if any documented dev default is still set
      # (dev signing key, dev DB password, dev-bypass route, oracle-mode
      # rejection reasons, registry-confirmation disabled). See
      # packages/broker/src/startupChecks.ts.
      # NOTE: this TS port still uses the opt-in HEARME_BROKER_PRODUCTION_MODE
      # toggle, NOT the "fail-closed-by-default + opt-in HEARME_BROKER_DEV_MODE"
      # inversion that landed on main in #62. Until that inversion is ported,
      # this env var MUST be set in prod — without it the startup checks do not
      # run and the dev defaults pass through silently. Follow-up: port #62 to TS.
      HEARME_BROKER_PRODUCTION_MODE: "1"
      HEARME_BROKER_REQUIRE_REGISTRY_CONFIRMATION: "1"
      HEARME_BROKER_EXPOSE_REJECTION_REASONS: "0"
      HEARME_BROKER_DEV_INSECURE_REGISTER: "0"
      HEARME_BROKER_SIGNING_KEY: ${HEARME_PROD_BROKER_SIGNING_KEY:?set in prod .env}
      # Per-question voter-tag secret store (ADR-098): a broker-owned
      # `hearme_secrets` database, co-located on the SAME RDS instance as the main
      # DB. At-rest protection is the AES-256-GCM wrap under the master key below
      # (a dump of the instance yields only ciphertext); the unlink guarantee comes
      # from destroying the wrapped secret at close. bootstrap-rds.sh creates the
      # `hearme_secrets` DB on the instance.
      HEARME_BROKER_SECRETS_DATABASE_URL: postgres://hearme_broker:${HEARME_PROD_POSTGRES_BROKER_PASSWORD:?set in prod .env}@${HEARME_PROD_POSTGRES_HOST:?set in prod .env}:5432/hearme_secrets?sslmode=require
      HEARME_BROKER_VOTER_TAG_MASTER_KEY: ${HEARME_PROD_BROKER_VOTER_TAG_MASTER_KEY:?set in prod .env}

  self-bridge:
    extends:
      file: docker-compose.yml
      service: self-bridge
    environment:
      # The callback the Self app posts proofs to MUST be public HTTPS.
      SELF_ENDPOINT: ${HEARME_PROD_SELF_ENDPOINT:?set in prod .env}
      # Mainnet endpoint type (not staging_https).
      SELF_ENDPOINT_TYPE: https
      # Real identity path: no mock passports, no dev mode.
      SELF_MOCK_PASSPORT: "0"
      SELF_DEV_MODE: "0"
      # Fail closed: refuse to boot if a mock/dev posture survives into prod
      # (mirrors the broker's startup_checks.py). See packages/self-bridge/src/server.js.
      SELF_PRODUCTION_MODE: "1"
      # Celo mainnet — pin so @selfxyz/core targets the mainnet IdentityVerification
      # Hub V2 (0xe57F4773bd9c9d8b6Cd70431117d353298B9f5BF) and not a testnet root.
      # The SDK does the on-chain registry/root check inside verify() and picks the
      # RPC + hub from the chain id; the bridge does not need SELF_CELO_RPC_URL or
      # SELF_REGISTRY_ADDRESS (see packages/self-bridge/src/server.js:148-179).
      SELF_CHAIN_ID: "42220"

  migrator:
    extends:
      file: docker-compose.yml
      service: migrator
    # RDS is external; nothing to wait on locally. The schema is bootstrapped
    # once by scripts/bootstrap-rds.sh; this run applies any later deltas.
    depends_on: !reset []
    environment:
      MIGRATOR_DATABASE_URL: postgres://hearme_admin:${HEARME_PROD_POSTGRES_ADMIN_PASSWORD:?set in prod .env}@${HEARME_PROD_POSTGRES_HOST:?set in prod .env}:5432/hearme?sslmode=require

  web:
    extends:
      file: docker-compose.yml
      service: web
    depends_on: !reset
      migrator:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://hearme_web:${HEARME_PROD_POSTGRES_WEB_PASSWORD:?set in prod .env}@${HEARME_PROD_POSTGRES_HOST:?set in prod .env}:5432/hearme?sslmode=require

  classifier:
    extends:
      file: docker-compose.yml
      service: classifier
    depends_on: !reset
      migrator:
        condition: service_completed_successfully
    environment:
      HEARME_CLASSIFIER_DATABASE_URL: postgres://hearme_classifier:${HEARME_PROD_POSTGRES_CLASSIFIER_PASSWORD:?set in prod .env}@${HEARME_PROD_POSTGRES_HOST:?set in prod .env}:5432/hearme?sslmode=require
      HEARME_CLASSIFIER_OPENROUTER_API_KEY: ${HEARME_PROD_OPENROUTER_API_KEY:?set in prod .env}

  caddy:
    image: caddy:2
    container_name: hearme-caddy
    restart: unless-stopped
    depends_on:
      - web
      - self-bridge
    environment:
      # The Caddyfile uses {$CADDY_SITE_HOST}; Caddy expands it at config-load
      # time. The fail-fast ":?" form makes compose error out instead of caddy
      # silently serving a config with an empty site block.
      CADDY_SITE_HOST: ${HEARME_PROD_CADDY_SITE_HOST:?set in prod .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
