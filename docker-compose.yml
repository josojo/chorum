# `docker compose up` brings up the chorum v0 *server* stack: shared Postgres,
# broker, web, and the self-bridge. None of these need a model-provider API key.
#
# The answering agent (the `chorum` skill) is NOT a service here: it runs inside
# the user's own Hermes or OpenClaw agent, which already has a model configured.
# Install the standalone binary (packages/skill, Rust), wire it into the host,
# and onboard:
#   curl -fsSL https://github.com/josojo/chorum/releases/latest/download/install.sh | sh
#   chorum-skill install     # drops the plugin/skill into Hermes/OpenClaw
#   chorum-skill onboard --bridge-url http://localhost:8787 --broker-url http://localhost:8000
#
# First run:
#   docker compose up --build
# Then open http://localhost:3000.
#
# Onboarding requires REAL Self proofs (verified once at the broker's
# /v1/register). Local dev defaults to mock-passport mode; public staging uses
# docker-compose.staging.yml to force real identity mode and non-dev secrets.
#
# To wipe state and start from scratch:
#   docker compose down -v && docker compose up --build
services:
  postgres:
    image: postgres:16
    container_name: chorum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chorum
      POSTGRES_USER: chorum_admin
      POSTGRES_PASSWORD: chorum_admin_dev
    # Bind published ports to loopback only. In prod/staging the overlays add
    # Caddy (the sole 0.0.0.0:80/443 listener) and reach every service over the
    # internal compose network (e.g. `postgres:5432`, `broker:8000`); the host
    # ports below exist purely for local-dev / on-box debugging and must never
    # be internet-reachable. (Compose merges `ports` by append, so the only
    # reliable way to keep these off the public interface in every environment
    # is to bind loopback here in the base file.)
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - chorum-pgdata:/var/lib/postgresql/data
      # Extensions + schema + roles + seed are applied on first container start,
      # in alpha order.
      # 00: extensions (pgcrypto — see db/init/00-extensions.sql)
      # 01: tables (the generated baseline migration; schema.ts is the source)
      # 02: roles + grants
      # 03: demo seed data (questions/envelopes/aggregates across scopes)
      - ./db/init/00-extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
      - ./packages/web/drizzle/migrations/0000_init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/init/02-roles.sh:/docker-entrypoint-initdb.d/02-roles.sh:ro
      # The role/grant body shared with the managed-Postgres path
      # (scripts/bootstrap-rds.sh). Mounted OUTSIDE initdb.d so the entrypoint
      # does not run it directly — 02-roles.sh applies it via `psql -f`.
      - ./db/init/roles.sql:/chorum/roles.sql:ro
      - ./db/init/03-seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro
      # 04: the broker-owned `chorum_secrets` DB for per-question voter-tag
      # secrets (ADR-098) — a second DB the broker owns (it has only USAGE on
      # `chorum`). In prod the same DB is co-located on the RDS instance
      # (bootstrap-rds.sh); the secret is wrapped at rest under the master key.
      - ./db/init/04-secrets-db.sh:/docker-entrypoint-initdb.d/04-secrets-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chorum_admin -d chorum"]
      interval: 3s
      timeout: 3s
      retries: 20

  broker:
    build:
      context: .
      dockerfile: packages/broker/Dockerfile
    # Tag the built image with the deploy's git SHA so the previous build stays
    # on the box as an immutable, named image — `scripts/rollback.sh` re-`up`s a
    # prior SHA without rebuilding. Defaults to `dev` for local `docker compose
    # up`. The deploy sets CHORUM_DEPLOY_SHA (see deploy-staging.yml / §7).
    image: chorum-broker:${CHORUM_DEPLOY_SHA:-dev}
    container_name: chorum-broker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      self-bridge:
        condition: service_started
    environment:
      # Local dev opts OUT of the fail-closed production startup checks so the
      # broker can boot with the dev signing key / dev DB password below. The
      # checks run BY DEFAULT (see startup_checks.py); the prod/staging overlays
      # do NOT set this, so they fail closed if a dev default leaks through.
      # This must NEVER be set in a deployed environment.
      CHORUM_BROKER_DEV_MODE: "1"
      # asyncpg DSN. scheme must be `postgres://` (asyncpg-style).
      CHORUM_BROKER_DATABASE_URL: postgres://chorum_broker:chorum_broker_dev@postgres:5432/chorum
      # Self proofs are verified once (at /v1/register) via the bridge the broker controls.
      CHORUM_BROKER_SELF_BRIDGE_URL: http://self-bridge:8787
      # Identity scope stamped into / checked on every credential. MUST equal the
      # self-bridge's SELF_SCOPE. Local-dev value; staging overrides to
      # "staging-chorum-v1" and prod IGNORES it (frozen to "chorum-v1" in code —
      # GH #97). See packages/broker/src/verify/scope.ts and docs/DEPLOYMENT.md.
      CHORUM_BROKER_SELF_SCOPE: chorum-v1
      # Dev: no Celo RPC wired into the bridge, so skip the on-chain registry
      # gate. Set to "1" (and wire SELF_CELO_RPC_URL on the bridge) for the
      # Sybil-hardening check. See ARCHITECTURE_V0.md §5.
      CHORUM_BROKER_REQUIRE_REGISTRY_CONFIRMATION: "0"
      # Dev signing key for the broker-issued DelegationToken. OVERRIDE in prod.
      CHORUM_BROKER_SIGNING_KEY: QlJPS0VSLVNJR05JTkctS0VZLUhFQVJNRS1ERVYzMkI=
      # Per-question voter-tag secret store (ADR-098, §1.4): a broker-owned DB
      # (04-secrets-db.sh), co-located on the same instance in prod. Each secret
      # is wrapped at rest under the master key below. OVERRIDE the key in prod.
      CHORUM_BROKER_SECRETS_DATABASE_URL: postgres://chorum_broker:chorum_broker_dev@postgres:5432/chorum_secrets
      CHORUM_BROKER_VOTER_TAG_MASTER_KEY: SEVBUk1FLVZPVEVSLVRBRy1TRUNSRVQtREVWLTMyQiE=
      # Optional production hook: poll Self on-chain identity invalidation/update
      # events and revoke matching Chorum registrations + accepted votes.
      CHORUM_BROKER_SELF_REVOCATION_LISTENER_ENABLED: "0"
      # CHORUM_BROKER_SELF_REVOCATION_RPC_URL: https://forno.celo.org
      # CHORUM_BROKER_SELF_REVOCATION_CONTRACT_ADDRESS: "0x..."
      # CHORUM_BROKER_SELF_REVOCATION_EVENT_TOPIC: "0x..."
    # Loopback only — see the note on the postgres service. Remote bot-runners
    # reach the broker over TLS via Caddy's `/v1/*` route, not this host port.
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/healthz').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  self-bridge:
    build:
      context: .
      dockerfile: packages/self-bridge/Dockerfile
    image: chorum-self-bridge:${CHORUM_DEPLOY_SHA:-dev}
    container_name: chorum-self-bridge
    restart: unless-stopped
    environment:
      # Local-dev nullifier scope. Staging overrides this to "staging-chorum-v1"
      # and prod IGNORES it entirely (frozen to "chorum-v1" in code — GH #97).
      # Frozen for the life of any environment's data: changing it orphans every
      # registration there. See scope.js PRODUCTION_SCOPE and docs/DEPLOYMENT.md.
      SELF_SCOPE: chorum-v1
      SELF_ENDPOINT: http://self-bridge:8787/callback
      SELF_ENDPOINT_TYPE: staging_https
      # mockPassport=1 accepts mock-passport proofs (staging/Celo testnet). Set 0
      # (mainnet) in production.
      SELF_MOCK_PASSPORT: "1"
      # The Self app only offers/accepts a MOCK passport when the request is in
      # dev mode. Defaults to SELF_MOCK_PASSPORT when unset; set explicitly here.
      SELF_DEV_MODE: "1"
      # If a mock-passport scan fails on a network/root mismatch, pin the testnet
      # chain the deployed @selfxyz/core checks: Celo Alfajores 44787 or Celo
      # Sepolia 11142220. Leave unset to use the SDK default for the endpointType.
      # SELF_CHAIN_ID: "44787"
      SELF_AGE_THRESHOLDS: "18,25,35,50,65"
      # Sybil hardening (registration-only on-chain check). Leave empty in dev;
      # set the Celo RPC URL + registry address to enable. See ARCHITECTURE_V0.md §5.
      # SELF_CELO_RPC_URL: https://forno.celo-sepolia.celo-testnet.org
      # SELF_REGISTRY_ADDRESS: "0x..."
    # Loopback only — see the note on the postgres service. The Self app and
    # remote bot-runners reach the bridge over TLS via Caddy's `/self/*` route;
    # the broker reaches it internally as `http://self-bridge:8787`.
    ports:
      - "127.0.0.1:8787:8787"

  # One-shot SQL migrator. Runs every `docker compose up` (re-runs are no-ops
  # — applied versions are tracked in `_schema_migrations`). On a fresh volume,
  # postgres's docker-entrypoint-initdb.d bootstraps the baseline migration
  # (drizzle/migrations/0000_init.sql) first, then this migrator baselines
  # `0000_init` and applies any later deltas. On an existing volume (e.g.
  # staging across schema changes), it just applies the new files. See
  # packages/web/scripts/migrate.mjs.
  migrator:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    image: chorum-migrator:${CHORUM_DEPLOY_SHA:-dev}
    container_name: chorum-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Admin DSN: chorum_web/chorum_broker roles can't ALTER.
      MIGRATOR_DATABASE_URL: postgres://chorum_admin:chorum_admin_dev@postgres:5432/chorum
    command: ["node", "scripts/migrate.mjs"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    image: chorum-web:${CHORUM_DEPLOY_SHA:-dev}
    container_name: chorum-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    # Liveness probe used by the deploy health gate. node:20-alpine ships node,
    # so we reuse the broker's fetch-based check against /api/healthz (a static
    # 200, no DB). start_period covers `next start` cold boot.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/healthz').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    environment:
      # postgres-js DSN. scheme `postgres://` works for both Drizzle's
      # postgres driver and the Next.js runtime.
      DATABASE_URL: postgres://chorum_web:chorum_web_dev@postgres:5432/chorum
      # /stats reads privacy-safe aggregate counts (agents, respondents) the
      # web role can't query directly from the broker.
      BROKER_URL: http://broker:8000
      NODE_ENV: production
    # Loopback only — see the note on the postgres service. In prod/staging
    # Caddy serves the web app to the internet via `reverse_proxy web:3000`.
    ports:
      - "127.0.0.1:3000:3000"

  # The classifier is a small background TS worker. It polls Postgres for
  # questions whose `topic` is still NULL and asks a cheap OpenRouter model
  # (default google/gemini-2.5-flash-lite) to assign 1–3 tokens from the
  # taxonomy in packages/proto/topics.json. The broker hides NULL-topic
  # questions from /v1/questions/open, so this service is the gate between
  # "asker just posted" and "agent is allowed to see it".
  #
  # If CHORUM_CLASSIFIER_OPENROUTER_API_KEY is not set, the service crashes on
  # boot with a clear error — deliberately fail-closed. New questions just
  # accumulate as NULL and stay invisible to agents until the key is provided.
  classifier:
    build:
      context: .
      dockerfile: packages/classifier/Dockerfile
    image: chorum-classifier:${CHORUM_DEPLOY_SHA:-dev}
    container_name: chorum-classifier
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      CHORUM_CLASSIFIER_DATABASE_URL: postgres://chorum_classifier:chorum_classifier_dev@postgres:5432/chorum
      # Provide via your shell (`.env` next to docker-compose.yml) — never
      # commit a key here. Docker Compose auto-loads `.env` for variable
      # substitution in this file. The variable is REQUIRED; the service will
      # fail to boot if it is missing.
      CHORUM_CLASSIFIER_OPENROUTER_API_KEY: ${CHORUM_CLASSIFIER_OPENROUTER_API_KEY:-}
      CHORUM_CLASSIFIER_MODEL: ${CHORUM_CLASSIFIER_MODEL:-google/gemini-2.5-flash-lite}
      CHORUM_CLASSIFIER_POLL_INTERVAL_MS: "10000"
      CHORUM_CLASSIFIER_BATCH_SIZE: "20"
      CHORUM_CLASSIFIER_REFERER: https://chorum.network
      CHORUM_CLASSIFIER_TITLE: chorum-classifier

  # NOTE: the answering agent is intentionally not a service here. It is the
  # `chorum` Hermes plugin and runs inside the user's Hermes agent (which holds
  # the model config + API key). See the header of this file to install it.

volumes:
  chorum-pgdata:
