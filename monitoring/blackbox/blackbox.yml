# blackbox-exporter modules (issue #101). Only an HTTP GET-200 probe is needed
# for the v0 liveness checks (broker / self-bridge / web /healthz).
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200]
      preferred_ip_protocol: ip4
      fail_if_not_ssl: false
